<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Reasonable-looking PR snippet</title>
  <desc id="desc">A docs-style illustration showing a plausible manual review branch and a high-risk test case, with a subtle note that the issue is hidden in the boundary and audit behavior.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="softBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="820" fill="url(#softBg)"/>
  <circle cx="1090" cy="100" r="260" fill="#dbeafe" opacity="0.45"/>
  <circle cx="1180" cy="690" r="220" fill="#ede9fe" opacity="0.5"/>
  <g filter="url(#shadow)">
    <rect x="110" y="90" width="1180" height="620" rx="28" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="110" y="90" width="1180" height="76" rx="28" fill="#f8fafc"/>
    <rect x="110" y="140" width="1180" height="26" fill="#f8fafc"/>
    <circle cx="150" cy="128" r="9" fill="#ef4444"/>
    <circle cx="178" cy="128" r="9" fill="#f59e0b"/>
    <circle cx="206" cy="128" r="9" fill="#22c55e"/>
    <text x="245" y="136" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#334155">customerRequests.ts</text>
    <text x="1045" y="136" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#64748b">PR review preview</text>
  </g>
  <text x="150" y="220" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="650" fill="#111827">The change looked reasonable at first glance</text>
  <text x="150" y="263" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" fill="#475569">A manual-review branch and a high-risk test case were added.</text>
  <g>
    <rect x="150" y="305" width="520" height="260" rx="18" fill="#0f172a"/>
    <rect x="150" y="305" width="520" height="44" rx="18" fill="#1e293b"/>
    <rect x="150" y="335" width="520" height="14" fill="#1e293b"/>
    <text x="178" y="334" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#cbd5e1">implementation</text>
    <text x="178" y="390" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#93c5fd">if</text>
    <text x="206" y="390" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb"> (request.riskScore </text>
    <text x="440" y="390" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#fca5a5">&gt;</text>
    <text x="458" y="390" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb"> MANUAL_REVIEW_THRESHOLD) {</text>
    <text x="198" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#93c5fd">return</text>
    <text x="278" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb"> {</text>
    <text x="226" y="462" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">...request,</text>
    <text x="226" y="498" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">status: </text>
    <text x="316" y="498" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#86efac">"manual_review_required"</text>
    <text x="590" y="498" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">,</text>
    <text x="198" y="534" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">};</text>
  </g>
  <g>
    <rect x="730" y="305" width="520" height="260" rx="18" fill="#0f172a"/>
    <rect x="730" y="305" width="520" height="44" rx="18" fill="#1e293b"/>
    <rect x="730" y="335" width="520" height="14" fill="#1e293b"/>
    <text x="758" y="334" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#cbd5e1">test</text>
    <text x="758" y="390" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">const result = processCustomerRequest({</text>
    <text x="786" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">...request,</text>
    <text x="786" y="462" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">riskScore: </text>
    <text x="918" y="462" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#fde68a">95</text>
    <text x="944" y="462" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">,</text>
    <text x="758" y="498" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">}, auditLog);</text>
    <text x="758" y="544" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">expect(result.status).toBe(</text>
    <text x="1070" y="544" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#86efac">"manual_review_required"</text>
    <text x="758" y="580" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#e5e7eb">);</text>
  </g>
  <g>
    <rect x="150" y="615" width="1100" height="64" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="188" cy="647" r="13" fill="url(#accent)"/>
    <text x="216" y="654" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" fill="#334155">The hidden risk was not syntax. It was the boundary value and missing audit evidence.</text>
  </g>
</svg>

